<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Formulario de Registro</title>
    </head>
    <body>
        <h1>¡Regístrate y únete a la comunidad!</h1>
        <form action="#" method="post"> </form>
            <div>
                <label for="nombre">Nombre: </label>
                <input type="text" id="nombre" name="nombre" />
            </div>
        <br>
            <div>
            <label for="apellido">Apellido: </label>
                <input type="text" id="apellido" name="apellido" />
            </div>
        <br>
            <div>
                <label for="email">Correo Electrónico: </label>
                <input type="email" id="email" name="email" />
            </div>
        <br>
            <div>
                <label for="clave">Contraseña: </label>
                <input type="password" id="clave" name="clave" />
            </div>
        <br>
            <div>
                <label for="confirmar_clave">Confirmar Contraseña: </label>
                <input type="password" id="confirmar_clave" name="confirmar_clave" />
            </div>
        <br>
            <div>
                <label for="fecha_nacimiento">Fecha de Nacimiento: </label>
                <input type="date" id="fecha_nacimiento" name="fecha_nacimiento" />
            </div>
        <br>
            <div>
                <label>Género: </label>
                <input type="radio" id="Masculino" name="genero" value="masculino" />
                <label for="Masculino">Masculino</label>
                <input type="radio" id="Femenino" name="genero" value="femenino" />
                <label for="Femenino">Femenino</label>
                <input type="radio" id="otro" name="genero" value="prefiero_no_decir" />
                <label for="otro">Prefiero no decir</label>
            </div>
        <br>
            <div>
                <input type="checkbox" id="acepto" name="acepto" />
                <label for="acepto">Suscríbete a nuestro boletín de noticias</label>
            </div>
        <br>
            <div>
                <label for="comentario">Una descripción de mi mismo: </label>
        <br>
                <textarea id="comentario" name="comentario" rows="4" cols="20"></textarea>
            </div>
        <br>
            <div>
                <label for="Selecciona_intereses">Selecciona tus intereses: </label>
        <br>
                <select id="Selecciona_intereses" name="Selecciona_intereses" multiple>
                    <option value="musica">Música</option>
                    <option value="deportes">Deportes</option>
                    <option value="viajes">Viajes</option>
                    <option value="tecnologia">Tecnología</option>
                </select>
            </div>
        <br>
            <input type="submit" value="¡Registrarse!" />
    </body>

</html>
